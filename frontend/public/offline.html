<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#06B6D4" />
    <title>AURA Offline</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #050505; color: #fff; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at top, rgba(6,182,212,.14), transparent 34%), #050505; }
      main { width: min(520px, 100%); border: 1px solid rgba(255,255,255,.1); border-radius: 18px; padding: 28px; background: rgba(13,13,13,.92); box-shadow: 0 24px 60px rgba(0,0,0,.35); }
      p:first-child { color: #06b6d4; font-size: 11px; font-weight: 800; letter-spacing: .22em; text-transform: uppercase; }
      h1 { margin: 12px 0; font-size: clamp(28px, 9vw, 44px); line-height: 1; }
      p { color: #a1a1aa; line-height: 1.6; }
      a { display: inline-flex; margin-top: 14px; color: #a5f3fc; font-weight: 800; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <p>AURA PWA</p>
      <h1>Offline mode</h1>
      <p>The command center is installed, but this route needs a network refresh. Previously cached assets and pages will reopen when connectivity returns.</p>
      <a href="/dashboard">Retry dashboard</a>
    </main>
  </body>
</html>
